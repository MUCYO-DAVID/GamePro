<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - GamePro</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="container flex">
        <a class="logo" href="/">GamePro</a>
        <nav class="navbar">
          <a href="/">Home</a>
          <a href="/signin">Sign In</a>
          <a class="active" href="/forgot-password">Forgot Password</a>
        </nav>
        <button class="mobile-menu-btn" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <section class="booking-section">
      <div class="container">
        <h2>Reset your password</h2>
        <div class="booking-container">
          <div class="booking-info">
            <h3>We’ll send a reset link</h3>
            <p>
              Enter your email address and we’ll send you a link to reset your password. The link expires in 30 minutes.
            </p>
          </div>

          <form class="booking-form" id="forgot-form">
            <div class="form-group">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="you@example.com" required />
            </div>
            <button class="btn" type="submit">Generate reset link</button>
            <p id="forgot-result" style="margin-top: 12px; font-size: 1.4rem"></p>
            <p id="reset-link" style="margin-top: 12px; font-size: 1.4rem; word-break: break-all"></p>
          </form>
        </div>
      </div>
    </section>

    <script src="/js/script.js"></script>
    <script src="/js/auth-ui.js"></script>
    <script src="/js/forgot-password.js"></script>
  </body>
</html>
