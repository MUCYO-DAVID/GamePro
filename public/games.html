<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games - GamePro</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="container flex">
        <a class="logo" href="/">GamePro</a>
        <nav class="navbar">
          <a href="/">Home</a>
          <a class="active" href="/games">Games</a>
          <a href="/booking">Book Now</a>
          <a href="/signup">Sign Up</a>
          <a href="/signin">Sign In</a>
        </nav>
        <button class="mobile-menu-btn" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <section class="games-showcase">
      <div class="container">
        <h2>Our Gaming Collection</h2>
        <div class="games-grid" id="games-grid"></div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-section">
            <h3>GamePro</h3>
            <p>Your premier gaming destination in Kabeza, Kicukiro, Kigali.</p>
          </div>
          <div class="footer-section">
            <h3>Quick Links</h3>
            <ul>
              <li><a href="/">Home</a></li>
              <li><a href="/games">Games</a></li>
              <li><a href="/booking">Book Now</a></li>
            </ul>
          </div>
          <div class="footer-section">
            <h3>Connect With Us</h3>
            <div class="social-links">
              <a
                href="https://facebook.com/kigaligamecenter"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Facebook"
                ><i class="fab fa-facebook"></i
              ></a>
              <a
                href="https://twitter.com/kigaligamecenter"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Twitter"
                ><i class="fab fa-twitter"></i
              ></a>
              <a
                href="https://instagram.com/kigaligamecenter"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Instagram"
                ><i class="fab fa-instagram"></i
              ></a>
            </div>
          </div>
        </div>
        <div class="footer-bottom">
          <p>&copy; 2024 Kigali Game Center. All rights reserved.</p>
        </div>
      </div>
    </footer>

    <script src="/js/script.js"></script>
    <script src="/js/auth-ui.js"></script>
    <script src="/js/games.js"></script>
  </body>
</html>
