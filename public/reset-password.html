<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password - GamePro</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="container flex">
        <a class="logo" href="/">GamePro</a>
        <nav class="navbar">
          <a href="/">Home</a>
          <a class="active" href="/reset-password">Reset Password</a>
        </nav>
        <button class="mobile-menu-btn" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <section class="booking-section">
      <div class="container">
        <h2>Choose a new password</h2>
        <div class="booking-container">
          <div class="booking-info">
            <h3>Security</h3>
            <p>Password must be at least 8 characters.</p>
          </div>

          <form class="booking-form" id="reset-form">
            <div class="form-group">
              <label for="password">New password</label>
              <input id="password" name="password" type="password" minlength="8" required />
            </div>
            <button class="btn" type="submit">Update password</button>
            <p id="reset-result" style="margin-top: 12px; font-size: 1.4rem"></p>
          </form>
        </div>
      </div>
    </section>

    <script src="/js/script.js"></script>
    <script src="/js/auth-ui.js"></script>
    <script src="/js/reset-password.js"></script>
  </body>
</html>
