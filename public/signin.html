<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - GamePro</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="container flex">
        <a class="logo" href="/">GamePro</a>
        <nav class="navbar">
          <a href="/">Home</a>
          <a href="/games">Games</a>
          <a href="/booking">Book Now</a>
          <a href="/signup">Sign Up</a>
          <a class="active" href="/signin">Sign In</a>
        </nav>
        <button class="mobile-menu-btn" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <section class="booking-section">
      <div class="container">
        <h2>Sign in</h2>
        <div class="booking-container">
          <div class="booking-info">
            <h3>Welcome back</h3>
            <p>If you enabled 2FA, you’ll be asked for a code after signing in.</p>
          </div>

          <form class="booking-form" id="signin-form">
            <div class="form-group">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" required />
            </div>
            <button class="btn" type="submit">Sign in</button>
            <p id="signin-result" style="margin-top: 12px; font-size: 1.4rem"></p>
            <p style="margin-top: 10px; font-size: 1.4rem">
              <a href="/forgot-password">Forgot password?</a>
            </p>
          </form>
        </div>
      </div>
    </section>

    <script src="/js/script.js"></script>
    <script src="/js/auth-ui.js"></script>
    <script src="/js/signin.js"></script>
  </body>
</html>
