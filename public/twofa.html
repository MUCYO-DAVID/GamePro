<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Two-Factor Authentication - GamePro</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="container flex">
        <a class="logo" href="/">GamePro</a>
        <nav class="navbar">
          <a href="/">Home</a>
          <a href="/games">Games</a>
          <a href="/booking">Book Now</a>
          <a class="active" href="/2fa">2FA</a>
        </nav>
        <button class="mobile-menu-btn" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <section class="booking-section">
      <div class="container">
        <h2>Two-Factor Authentication (2FA)</h2>
        <div class="booking-container">
          <div class="booking-info">
            <h3>Setup</h3>
            <p>Scan the QR code in an authenticator app, then enter the 6-digit code to enable 2FA.</p>
            <div id="qr-wrap" style="margin-top: 16px"></div>
            <p id="manual-key" style="margin-top: 12px; font-size: 1.4rem"></p>
          </div>

          <form class="booking-form" id="twofa-form">
            <button class="btn" id="setup-btn" type="button">Generate QR</button>
            <div class="form-group" style="margin-top: 16px">
              <label for="token">6-digit code</label>
              <input id="token" name="token" type="text" inputmode="numeric" placeholder="123456" />
            </div>
            <button class="btn" type="submit">Enable 2FA</button>
            <p id="twofa-result" style="margin-top: 12px; font-size: 1.4rem"></p>
          </form>
        </div>
      </div>
    </section>

    <script src="/js/script.js"></script>
    <script src="/js/auth-ui.js"></script>
    <script src="/js/twofa.js"></script>
  </body>
</html>
